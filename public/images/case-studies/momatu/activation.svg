<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="8" fill="#FFFFFF"/>
  <text x="40" y="40" font-family="system-ui" font-size="18" font-weight="600" fill="#1A1A1A">New User Activation Funnel</text>
  <text x="40" y="60" font-family="system-ui" font-size="11" fill="#6B6B6B">Cohort: Oct–Dec 2022 · Before and after JTBD-driven onboarding redesign</text>

  <!-- Horizontal bar chart -->
  <rect x="40" y="84" width="720" height="340" rx="8" fill="#F7F7F5" stroke="#E5E5E5"/>

  <!-- Step labels and bars -->
  <text x="60" y="130" font-family="system-ui" font-size="11" font-weight="600" fill="#1A1A1A">Download</text>
  <rect x="180" y="116" width="540" height="18" rx="3" fill="#7C3AED" opacity="0.2"/>
  <rect x="180" y="116" width="540" height="18" rx="3" fill="#7C3AED" opacity="0.6"/>
  <text x="730" y="130" font-family="monospace" font-size="10" fill="#FFF" text-anchor="end">100%</text>

  <text x="60" y="174" font-family="system-ui" font-size="11" font-weight="600" fill="#1A1A1A">Onboarding</text>
  <rect x="180" y="160" width="540" height="18" rx="3" fill="#7C3AED" opacity="0.1"/>
  <rect x="180" y="160" width="432" height="8" rx="2" fill="#CCCCCC" opacity="0.6"/>
  <text x="618" y="168" font-family="monospace" font-size="9" fill="#6B6B6B">54% before</text>
  <rect x="180" y="170" width="486" height="8" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="672" y="178" font-family="monospace" font-size="9" fill="#7C3AED">72% after</text>

  <text x="60" y="218" font-family="system-ui" font-size="11" font-weight="600" fill="#1A1A1A">First Upload</text>
  <rect x="180" y="204" width="540" height="18" rx="3" fill="#7C3AED" opacity="0.1"/>
  <rect x="180" y="204" width="270" height="8" rx="2" fill="#CCCCCC" opacity="0.6"/>
  <text x="456" y="212" font-family="monospace" font-size="9" fill="#6B6B6B">32% before</text>
  <rect x="180" y="214" width="378" height="8" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="564" y="222" font-family="monospace" font-size="9" fill="#7C3AED">56% after</text>

  <text x="60" y="262" font-family="system-ui" font-size="11" font-weight="600" fill="#1A1A1A">5+ Uploads</text>
  <rect x="180" y="248" width="540" height="18" rx="3" fill="#7C3AED" opacity="0.1"/>
  <rect x="180" y="248" width="108" height="8" rx="2" fill="#CCCCCC" opacity="0.6"/>
  <text x="294" y="256" font-family="monospace" font-size="9" fill="#6B6B6B">12% before</text>
  <rect x="180" y="258" width="216" height="8" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="402" y="266" font-family="monospace" font-size="9" fill="#7C3AED">28% after</text>

  <text x="60" y="306" font-family="system-ui" font-size="11" font-weight="600" fill="#1A1A1A">Weekly Active</text>
  <rect x="180" y="292" width="540" height="18" rx="3" fill="#7C3AED" opacity="0.1"/>
  <rect x="180" y="292" width="54" height="8" rx="2" fill="#CCCCCC" opacity="0.6"/>
  <text x="240" y="300" font-family="monospace" font-size="9" fill="#6B6B6B">6% before</text>
  <rect x="180" y="302" width="140" height="8" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="326" y="310" font-family="monospace" font-size="9" fill="#7C3AED">22% after (+16pp)</text>

  <text x="60" y="350" font-family="system-ui" font-size="11" font-weight="600" fill="#1A1A1A">Shared Story</text>
  <rect x="180" y="336" width="540" height="18" rx="3" fill="#7C3AED" opacity="0.1"/>
  <rect x="180" y="336" width="27" height="8" rx="2" fill="#CCCCCC" opacity="0.6"/>
  <text x="213" y="344" font-family="monospace" font-size="9" fill="#6B6B6B">2% before</text>
  <rect x="180" y="346" width="81" height="8" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="267" y="354" font-family="monospace" font-size="9" fill="#7C3AED">9% after</text>

  <!-- Legend -->
  <rect x="60" y="388" width="12" height="4" rx="2" fill="#CCCCCC"/>
  <text x="80" y="393" font-family="system-ui" font-size="10" fill="#6B6B6B">Before (generic onboarding)</text>
  <rect x="260" y="388" width="12" height="4" rx="2" fill="#7C3AED"/>
  <text x="280" y="393" font-family="system-ui" font-size="10" fill="#7C3AED">After (JTBD-driven redesign)</text>

  <!-- Bottom insight -->
  <rect x="40" y="440" width="720" height="44" rx="8" fill="#7C3AED" opacity="0.06" stroke="#7C3AED" stroke-width="1" opacity="0.15"/>
  <text x="60" y="460" font-family="system-ui" font-size="11" fill="#1A1A1A">💡 JTBD insight: Users didn't want "photo storage" — they wanted to relive their best moments. Reframing onboarding around</text>
  <text x="60" y="476" font-family="system-ui" font-size="11" fill="#1A1A1A">"curate your highlights" instead of "upload your photos" drove +30pp activation in the first week.</text>
</svg>
