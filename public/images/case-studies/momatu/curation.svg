<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 700" fill="none">
  <!-- Mobile - ML Photo Curation -->
  <rect width="375" height="700" rx="32" fill="#FFFFFF"/>
  <!-- Status bar -->
  <text x="24" y="20" font-family="system-ui" font-size="12" font-weight="600" fill="#1A1A1A">9:41</text>
  <rect x="300" y="12" width="24" height="10" rx="2" fill="#1A1A1A"/>
  <rect x="301" y="13" width="16" height="8" rx="1.5" fill="#7C3AED"/>
  <!-- Header -->
  <text x="24" y="60" font-family="system-ui" font-size="20" font-weight="700" fill="#1A1A1A">Your Moments</text>
  <text x="24" y="80" font-family="system-ui" font-size="12" fill="#6B6B6B">AI-curated highlights from your photos</text>

  <!-- Filter chips -->
  <rect x="16" y="96" width="72" height="28" rx="14" fill="#7C3AED"/>
  <text x="36" y="114" font-family="system-ui" font-size="11" font-weight="600" fill="#FFF">All</text>
  <rect x="96" y="96" width="72" height="28" rx="14" fill="#F7F7F5" stroke="#E5E5E5"/>
  <text x="112" y="114" font-family="system-ui" font-size="11" fill="#6B6B6B">Nature</text>
  <rect x="176" y="96" width="72" height="28" rx="14" fill="#F7F7F5" stroke="#E5E5E5"/>
  <text x="192" y="114" font-family="system-ui" font-size="11" fill="#6B6B6B">People</text>
  <rect x="256" y="96" width="72" height="28" rx="14" fill="#F7F7F5" stroke="#E5E5E5"/>
  <text x="276" y="114" font-family="system-ui" font-size="11" fill="#6B6B6B">Travel</text>

  <!-- Photo grid -->
  <!-- Row 1 - two photos -->
  <rect x="16" y="140" width="168" height="200" rx="12" fill="#E8E0F0"/>
  <rect x="40" y="200" width="120" height="40" rx="8" fill="#FFF" opacity="0.9"/>
  <text x="56" y="216" font-family="system-ui" font-size="9" font-weight="600" fill="#7C3AED">✨ Best shot</text>
  <text x="56" y="230" font-family="system-ui" font-size="9" fill="#6B6B6B">98% quality score</text>
  <rect x="60" y="252" width="64" height="64" rx="8" fill="#D0C0E8"/>
  <text x="80" y="290" font-family="system-ui" font-size="20" fill="#7C3AED" text-anchor="middle">🌸</text>

  <rect x="192" y="140" width="168" height="96" rx="12" fill="#F0E8F5"/>
  <rect x="216" y="164" width="120" height="48" rx="8" fill="#D8CCE8"/>
  <text x="250" y="192" font-family="system-ui" font-size="18" fill="#7C3AED" text-anchor="middle">🏔</text>

  <rect x="192" y="244" width="168" height="96" rx="12" fill="#E5DCF0"/>
  <rect x="216" y="268" width="120" height="48" rx="8" fill="#CCC0E0"/>
  <text x="250" y="296" font-family="system-ui" font-size="18" fill="#7C3AED" text-anchor="middle">🌅</text>

  <!-- ML label overlay -->
  <rect x="16" y="356" width="343" height="48" rx="10" fill="#7C3AED" opacity="0.08"/>
  <text x="36" y="376" font-family="system-ui" font-size="11" fill="#7C3AED">🤖 ML detected: 3 landscapes, 2 portraits, 1 food</text>
  <text x="36" y="392" font-family="system-ui" font-size="10" fill="#6B6B6B">Auto-tagged using Image Labelling API</text>

  <!-- Row 2 -->
  <rect x="16" y="420" width="110" height="110" rx="12" fill="#F0E8F5"/>
  <text x="54" y="482" font-family="system-ui" font-size="24" fill="#7C3AED" text-anchor="middle">🍕</text>

  <rect x="134" y="420" width="110" height="110" rx="12" fill="#E8E0F0"/>
  <text x="172" y="482" font-family="system-ui" font-size="24" fill="#7C3AED" text-anchor="middle">🌿</text>

  <rect x="252" y="420" width="108" height="110" rx="12" fill="#E0D8EC"/>
  <text x="290" y="482" font-family="system-ui" font-size="24" fill="#7C3AED" text-anchor="middle">☀️</text>

  <!-- Create story CTA -->
  <rect x="16" y="548" width="343" height="52" rx="12" fill="#7C3AED"/>
  <text x="130" y="578" font-family="system-ui" font-size="14" font-weight="600" fill="#FFF">✨ Create Story from Best</text>

  <!-- Stats bar -->
  <rect x="16" y="616" width="343" height="44" rx="10" fill="#F7F7F5"/>
  <text x="64" y="642" font-family="system-ui" font-size="10" fill="#1A1A1A" text-anchor="middle">247 photos</text>
  <text x="188" y="642" font-family="system-ui" font-size="10" fill="#1A1A1A" text-anchor="middle">12 curated</text>
  <text x="310" y="642" font-family="system-ui" font-size="10" fill="#1A1A1A" text-anchor="middle">3 stories</text>

  <!-- Bottom nav -->
  <rect x="128" y="688" width="120" height="4" rx="2" fill="#1A1A1A"/>
</svg>
