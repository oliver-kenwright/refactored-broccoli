  <text x="60" y="110" font-family="system-ui" font-size="12" font-weight="600" fill="#7C3AED">Job #1 — Relive</text>
  <text x="60" y="148" font-family="system-ui" font-size="11" fill="#1A1A1A">"When I have a quiet moment,</text>
  <text x="60" y="164" font-family="system-ui" font-size="11" fill="#1A1A1A">I want to relive my best memories</text>
  <text x="60" y="180" font-family="system-ui" font-size="11" fill="#1A1A1A">without scrolling through 1000s</text>
  <text x="60" y="196" font-family="system-ui" font-size="11" fill="#1A1A1A">of photos."</text>
  <rect x="60" y="216" width="44" height="20" rx="4" fill="#7C3AED" opacity="0.1"/>
  <text x="68" y="230" font-family="monospace" font-size="9" font-weight="600" fill="#7C3AED">68%</text>
  <text x="112" y="230" font-family="system-ui" font-size="9" fill="#6B6B6B">of respondents</text>

  <rect x="280" y="84" width="224" height="164" rx="10" fill="#FFF" stroke="#7C3AED" stroke-width="1.5" opacity="0.7"/>
