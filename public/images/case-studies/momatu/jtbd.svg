  <text x="260" y="364" font-family="monospace" font-size="10" fill="#7C3AED" text-anchor="middle">$7.99</text>
  <text x="260" y="378" font-family="system-ui" font-size="9" fill="#6B6B6B" text-anchor="middle">Too expensive</text>

  <rect x="60" y="400" width="300" height="60" rx="6" fill="#FFF"/>
  <text x="80" y="424" font-family="system-ui" font-size="11" fill="#1A1A1A">Recommendation: $4.99/mo premium</text>
  <text x="80" y="442" font-family="system-ui" font-size="10" fill="#6B6B6B">78% WTP at this price · 12mo funding secured</text>

