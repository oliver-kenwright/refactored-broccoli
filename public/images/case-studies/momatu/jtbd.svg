  <text x="540" y="148" font-family="system-ui" font-size="11" fill="#1A1A1A">"I worry about losing my photos.</text>
  <text x="540" y="164" font-family="system-ui" font-size="11" fill="#1A1A1A">I want them safe, organised,</text>
  <text x="540" y="180" font-family="system-ui" font-size="11" fill="#1A1A1A">and accessible for my kids</text>
  <text x="540" y="196" font-family="system-ui" font-size="11" fill="#1A1A1A">someday."</text>
