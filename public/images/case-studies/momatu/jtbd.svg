  <text x="300" y="196" font-family="system-ui" font-size="11" fill="#1A1A1A">who were there."</text>
  <rect x="300" y="216" width="44" height="20" rx="4" fill="#7C3AED" opacity="0.1"/>
  <text x="308" y="230" font-family="monospace" font-size="9" font-weight="600" fill="#7C3AED">52%</text>
  <text x="352" y="230" font-family="system-ui" font-size="9" fill="#6B6B6B">of respondents</text>

  <rect x="520" y="84" width="224" height="164" rx="10" fill="#FFF" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
