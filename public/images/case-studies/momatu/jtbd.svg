  <text x="578" y="412" font-family="monospace" font-size="10" fill="#6B6B6B" text-anchor="end">8% CTR</text>

  <rect x="420" y="432" width="316" height="28" rx="6" fill="#7C3AED" opacity="0.08"/>
  <text x="436" y="450" font-family="system-ui" font-size="10" font-weight="600" fill="#7C3AED">→ AI Curation selected as core differentiator</text>
