  <text x="708" y="348" font-family="monospace" font-size="10" fill="#FFF" text-anchor="end">34% CTR</text>

  <text x="420" y="378" font-family="system-ui" font-size="10" fill="#1A1A1A">Story Creator</text>
  <rect x="520" y="368" width="120" height="14" rx="3" fill="#7C3AED" opacity="0.6"/>
  <text x="648" y="380" font-family="monospace" font-size="10" fill="#7C3AED" text-anchor="end">22% CTR</text>

  <text x="420" y="410" font-family="system-ui" font-size="10" fill="#1A1A1A">Photo Book</text>
