<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 700" fill="none">
  <!-- Mobile - TIER Miles screen -->
  <rect width="375" height="700" rx="32" fill="#1A1A1A"/>
  <!-- Status bar -->
  <text x="24" y="20" font-family="system-ui" font-size="12" font-weight="600" fill="#FFF">9:41</text>
  <rect x="300" y="12" width="24" height="10" rx="2" fill="#FFF" opacity="0.3"/>
  <rect x="301" y="13" width="18" height="8" rx="1.5" fill="#00C9A7"/>
  <!-- Header -->
  <text x="24" y="64" font-family="system-ui" font-size="11" fill="#00C9A7">← Back</text>
  <text x="130" y="64" font-family="system-ui" font-size="14" font-weight="600" fill="#FFF">TIER Miles</text>
  <!-- Points card -->
  <rect x="16" y="88" width="343" height="180" rx="16" fill="url(#tierGrad)"/>
  <defs>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="343" y2="180">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#00A088"/>
    </linearGradient>
  </defs>
  <text x="36" y="120" font-family="system-ui" font-size="11" fill="#FFF" opacity="0.8">Your Miles</text>
  <text x="36" y="160" font-family="system-ui" font-size="42" font-weight="700" fill="#FFF">2,847</text>
  <text x="36" y="184" font-family="system-ui" font-size="12" fill="#FFF" opacity="0.7">Gold tier · 153 miles to Platinum</text>
  <!-- Progress bar -->
  <rect x="36" y="204" width="303" height="6" rx="3" fill="#FFF" opacity="0.2"/>
  <rect x="36" y="204" width="240" height="6" rx="3" fill="#FFF"/>
  <rect x="36" y="220" width="303" height="28" rx="6" fill="#FFF" opacity="0.15"/>
  <text x="52" y="238" font-family="system-ui" font-size="11" fill="#FFF">🎯 Ride 3 more times this week for bonus 50 miles</text>

  <!-- Reward cards -->
  <text x="24" y="300" font-family="system-ui" font-size="13" font-weight="600" fill="#FFF">Rewards</text>

  <rect x="16" y="316" width="165" height="140" rx="12" fill="#2A2A2A"/>
  <rect x="16" y="316" width="165" height="70" rx="12" fill="#00C9A7" opacity="0.15"/>
  <rect x="16" y="374" width="165" height="12" fill="#2A2A2A"/>
  <text x="60" y="358" font-family="system-ui" font-size="20" text-anchor="middle" fill="#00C9A7">☕</text>
  <text x="32" y="404" font-family="system-ui" font-size="12" font-weight="600" fill="#FFF">Free coffee</text>
  <text x="32" y="420" font-family="system-ui" font-size="10" fill="#6B6B6B">500 miles</text>
  <rect x="32" y="432" width="60" height="20" rx="4" fill="#00C9A7"/>
  <text x="44" y="446" font-family="system-ui" font-size="10" font-weight="600" fill="#1A1A1A">Redeem</text>

  <rect x="194" y="316" width="165" height="140" rx="12" fill="#2A2A2A"/>
  <rect x="194" y="316" width="165" height="70" rx="12" fill="#00C9A7" opacity="0.15"/>
  <rect x="194" y="374" width="165" height="12" fill="#2A2A2A"/>
  <text x="238" y="358" font-family="system-ui" font-size="20" text-anchor="middle" fill="#00C9A7">🛴</text>
  <text x="210" y="404" font-family="system-ui" font-size="12" font-weight="600" fill="#FFF">Free ride</text>
  <text x="210" y="420" font-family="system-ui" font-size="10" fill="#6B6B6B">1,000 miles</text>
  <rect x="210" y="432" width="60" height="20" rx="4" fill="#00C9A7"/>
  <text x="222" y="446" font-family="system-ui" font-size="10" font-weight="600" fill="#1A1A1A">Redeem</text>

  <!-- Activity -->
  <text x="24" y="496" font-family="system-ui" font-size="13" font-weight="600" fill="#FFF">Recent Activity</text>

  <rect x="16" y="512" width="343" height="52" rx="8" fill="#2A2A2A"/>
  <text x="36" y="536" font-family="system-ui" font-size="12" fill="#FFF">Morning commute</text>
  <text x="36" y="552" font-family="system-ui" font-size="10" fill="#6B6B6B">Today · 12 min ride</text>
  <text x="320" y="536" font-family="system-ui" font-size="12" font-weight="600" fill="#00C9A7" text-anchor="end">+24</text>

  <rect x="16" y="572" width="343" height="52" rx="8" fill="#2A2A2A"/>
  <text x="36" y="596" font-family="system-ui" font-size="12" fill="#FFF">Evening ride</text>
  <text x="36" y="612" font-family="system-ui" font-size="10" fill="#6B6B6B">Yesterday · 8 min ride</text>
  <text x="320" y="596" font-family="system-ui" font-size="12" font-weight="600" fill="#00C9A7" text-anchor="end">+16</text>

  <!-- Bottom nav -->
  <rect x="0" y="640" width="375" height="60" fill="#1A1A1A" stroke="#333"/>
  <text x="65" y="670" font-family="system-ui" font-size="9" fill="#6B6B6B" text-anchor="middle">Ride</text>
  <text x="188" y="670" font-family="system-ui" font-size="9" fill="#00C9A7" text-anchor="middle">Miles</text>
  <text x="310" y="670" font-family="system-ui" font-size="9" fill="#6B6B6B" text-anchor="middle">Account</text>
  <rect x="128" y="688" width="120" height="4" rx="2" fill="#FFF" opacity="0.3"/>
</svg>
