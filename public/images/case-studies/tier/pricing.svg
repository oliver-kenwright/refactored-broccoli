<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="8" fill="#FFFFFF"/>
  <text x="40" y="40" font-family="system-ui" font-size="18" font-weight="600" fill="#1A1A1A">Multi-Modal Revenue by Vehicle Type</text>
  <text x="40" y="60" font-family="system-ui" font-size="11" fill="#6B6B6B">Monthly revenue · All markets · H2 2021</text>

  <!-- Bar chart -->
  <rect x="80" y="80" width="680" height="340" rx="8" fill="#F7F7F5" stroke="#E5E5E5"/>

  <!-- Y axis -->
  <text x="96" y="120" font-family="monospace" font-size="9" fill="#6B6B6B">€8M</text>
  <text x="96" y="176" font-family="monospace" font-size="9" fill="#6B6B6B">€6M</text>
  <text x="96" y="232" font-family="monospace" font-size="9" fill="#6B6B6B">€4M</text>
  <text x="96" y="288" font-family="monospace" font-size="9" fill="#6B6B6B">€2M</text>
  <text x="96" y="344" font-family="monospace" font-size="9" fill="#6B6B6B">€0</text>

  <!-- Grid -->
  <line x1="130" y1="116" x2="740" y2="116" stroke="#E5E5E5" stroke-dasharray="4"/>
  <line x1="130" y1="172" x2="740" y2="172" stroke="#E5E5E5" stroke-dasharray="4"/>
  <line x1="130" y1="228" x2="740" y2="228" stroke="#E5E5E5" stroke-dasharray="4"/>
  <line x1="130" y1="284" x2="740" y2="284" stroke="#E5E5E5" stroke-dasharray="4"/>
  <line x1="130" y1="340" x2="740" y2="340" stroke="#E5E5E5"/>

  <!-- Bars for each month - stacked -->
  <!-- Jul -->
  <rect x="150" y="200" width="40" height="140" rx="2" fill="#00C9A7"/>
  <rect x="150" y="256" width="40" height="84" rx="0" fill="#00C9A7" opacity="0.5"/>
  <text x="170" y="362" font-family="monospace" font-size="9" fill="#6B6B6B" text-anchor="middle">Jul</text>
  <!-- Aug -->
  <rect x="220" y="188" width="40" height="152" rx="2" fill="#00C9A7"/>
  <rect x="220" y="250" width="40" height="90" rx="0" fill="#00C9A7" opacity="0.5"/>
  <text x="240" y="362" font-family="monospace" font-size="9" fill="#6B6B6B" text-anchor="middle">Aug</text>
  <!-- Sep -->
  <rect x="290" y="172" width="40" height="168" rx="2" fill="#00C9A7"/>
  <rect x="290" y="240" width="40" height="100" rx="0" fill="#00C9A7" opacity="0.5"/>
  <rect x="290" y="144" width="40" height="28" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="310" y="362" font-family="monospace" font-size="9" fill="#6B6B6B" text-anchor="middle">Sep</text>
  <!-- Oct -->
  <rect x="360" y="160" width="40" height="180" rx="2" fill="#00C9A7"/>
  <rect x="360" y="236" width="40" height="104" rx="0" fill="#00C9A7" opacity="0.5"/>
  <rect x="360" y="124" width="40" height="36" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="380" y="362" font-family="monospace" font-size="9" fill="#6B6B6B" text-anchor="middle">Oct</text>
  <!-- Nov -->
  <rect x="430" y="148" width="40" height="192" rx="2" fill="#00C9A7"/>
  <rect x="430" y="228" width="40" height="112" rx="0" fill="#00C9A7" opacity="0.5"/>
  <rect x="430" y="104" width="40" height="44" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="450" y="362" font-family="monospace" font-size="9" fill="#6B6B6B" text-anchor="middle">Nov</text>
  <!-- Dec -->
  <rect x="500" y="136" width="40" height="204" rx="2" fill="#00C9A7"/>
  <rect x="500" y="224" width="40" height="116" rx="0" fill="#00C9A7" opacity="0.5"/>
  <rect x="500" y="84" width="40" height="52" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="520" y="362" font-family="monospace" font-size="9" fill="#6B6B6B" text-anchor="middle">Dec</text>

  <!-- Annotation arrow -->
  <line x1="310" y1="130" x2="310" y2="100" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="320" y="96" font-family="system-ui" font-size="10" font-weight="600" fill="#7C3AED">eMoped launch</text>

  <!-- Legend -->
  <rect x="100" y="384" width="12" height="12" rx="2" fill="#00C9A7"/>
  <text x="118" y="394" font-family="system-ui" font-size="10" fill="#1A1A1A">eScooters (PAYG)</text>
  <rect x="220" y="384" width="12" height="12" rx="2" fill="#00C9A7" opacity="0.5"/>
  <text x="238" y="394" font-family="system-ui" font-size="10" fill="#1A1A1A">eScooters (Pass)</text>
  <rect x="340" y="384" width="12" height="12" rx="2" fill="#7C3AED" opacity="0.7"/>
  <text x="358" y="394" font-family="system-ui" font-size="10" fill="#1A1A1A">eMopeds</text>

  <!-- Side callout -->
  <rect x="580" y="100" width="180" height="200" rx="8" fill="#F7F7F5" stroke="#E5E5E5"/>
  <text x="600" y="128" font-family="system-ui" font-size="12" font-weight="600" fill="#1A1A1A">eMoped Impact</text>
  <text x="600" y="160" font-family="system-ui" font-size="28" font-weight="700" fill="#7C3AED">€5.3m</text>
  <text x="600" y="180" font-family="system-ui" font-size="11" fill="#6B6B6B">Projected LTV</text>
  <rect x="600" y="196" width="140" height="1" fill="#E5E5E5"/>
  <text x="600" y="220" font-family="monospace" font-size="10" fill="#6B6B6B">Avg ride value</text>
  <text x="600" y="238" font-family="system-ui" font-size="16" font-weight="600" fill="#1A1A1A">€4.20</text>
  <text x="600" y="260" font-family="monospace" font-size="10" fill="#6B6B6B">vs eScooter €2.10</text>
  <text x="600" y="284" font-family="system-ui" font-size="11" font-weight="600" fill="#00C9A7">2x revenue per ride</text>

  <!-- Bottom insight -->
  <rect x="80" y="420" width="680" height="60" rx="8" fill="#00C9A7" opacity="0.08" stroke="#00C9A7" stroke-width="1" opacity="0.2"/>
  <text x="100" y="448" font-family="system-ui" font-size="11" fill="#1A1A1A">💡 Pricing platform refactor enabled 15+ pricing configurations across vehicle types and markets — supporting dynamic pricing, passes, and promotional rates.</text>
  <text x="100" y="466" font-family="system-ui" font-size="10" fill="#6B6B6B">Previously: 1 hardcoded price per market. Now: Full pricing flexibility per vehicle × market × time.</text>
</svg>
